<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asim</title>
<link rel="stylesheet" href="https://unpkg.com/vis-network/styles/vis-network.css">
<style>
  :root { --indigo:#4f46e5; --indigo-hover:#4338ca; --border:#e5e7eb; --bg:#fafafa; --text:#111827; --muted:#6b7280; }
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:32px 16px; line-height:1.5; }
  .container { max-width:900px; margin:0 auto; }
  .section { background:white; border:1px solid var(--border); border-radius:8px; padding:24px; margin-bottom:24px; box-shadow:0 1px 2px rgba(0,0,0,0.04); }
  .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  h2 { margin:0; font-size:18px; font-weight:700; color:var(--text); }
  .subtitle { font-size:14px; color:var(--muted); margin:0 0 16px; }
  textarea, input[type=text] { width:100%; font:inherit; padding:10px 12px; border:1px solid var(--border); border-radius:6px; background:white; color:var(--text); }
  textarea { height:250px; resize:vertical; }
  textarea:focus, input[type=text]:focus { outline:none; border-color:var(--indigo); box-shadow:0 0 0 3px rgba(79,70,229,0.15); }
  button.primary { background:var(--indigo); color:white; border:none; padding:10px 20px; border-radius:6px; font:inherit; font-weight:500; cursor:pointer; transition:background 0.15s; }
  button.primary:hover:not(:disabled) { background:var(--indigo-hover); }
  button.primary:disabled { opacity:0.5; cursor:not-allowed; }
  button.secondary { background:white; color:var(--text); border:1px solid var(--border); padding:6px 12px; border-radius:6px; font:inherit; font-size:13px; cursor:pointer; }
  button.secondary:hover { background:var(--bg); }
  .actions { margin-top:12px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .toast { background:#ecfdf5; color:#065f46; padding:6px 12px; border-radius:6px; font-size:14px; transition:opacity 0.5s; }
  .toast.fade { opacity:0; }
  .error { background:#fef2f2; color:#991b1b; padding:8px 12px; border-radius:6px; font-size:14px; margin-top:12px; word-break:break-word; }
  #graph { height:500px; border:1px solid var(--border); background:var(--bg); border-radius:6px; position:relative; }
  #graph .empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:14px; }
  #details { margin-top:12px; padding:12px 16px; border:1px solid var(--border); border-radius:6px; background:var(--bg); display:none; }
  #details.visible { display:block; }
  #details .node-label { font-size:16px; font-weight:600; color:var(--text); }
  #details .node-summary { font-size:14px; color:var(--muted); margin-top:4px; }
  .chat-area { max-height:400px; overflow-y:auto; padding:8px 0; display:flex; flex-direction:column; gap:12px; }
  .bubble { max-width:75%; padding:10px 14px; border-radius:10px; font-size:14px; line-height:1.5; word-wrap:break-word; }
  .bubble.user { align-self:flex-end; background:var(--indigo); color:white; }
  .bubble.agent { align-self:flex-start; background:#f3f4f6; color:var(--text); }
  .bubble details { margin-top:8px; font-size:12px; }
  .bubble details summary { cursor:pointer; color:var(--muted); list-style:none; user-select:none; }
  .bubble details summary::-webkit-details-marker { display:none; }
  .bubble pre { background:white; border:1px solid var(--border); padding:8px; border-radius:4px; font-size:12px; margin:8px 0 0; max-width:100%; white-space:pre-wrap; word-break:break-word; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
  .chip { background:white; border:1px solid var(--border); padding:6px 12px; border-radius:999px; font:inherit; font-size:13px; cursor:pointer; transition:all 0.1s; }
  .chip:hover { background:var(--bg); border-color:var(--indigo); color:var(--indigo); }
  .input-row { display:flex; gap:8px; margin-top:12px; }
  .input-row input { flex:1; }
  @keyframes blink { 0%, 20% { content:'.'; } 40% { content:'..'; } 60%, 100% { content:'...'; } }
  .dots::after { content:'.'; display:inline-block; animation:blink 1.2s steps(3,end) infinite; }
</style>
</head>
<body>
<div class="container">

  <section class="section">
    <h2>1. Ingest</h2>
    <p class="subtitle">Paste any text about you — resume, survey answers, a paragraph about a project.</p>
    <textarea id="ingest-text" placeholder="Tell me about yourself..."></textarea>
    <div class="actions">
      <button id="ingest-btn" class="primary">Ingest</button>
      <span id="ingest-status"></span>
    </div>
  </section>

  <section class="section">
    <div class="section-header">
      <h2>2. Identity Graph</h2>
      <button id="refresh-btn" class="secondary">Refresh</button>
    </div>
    <p class="subtitle">Click a node to see details. Hover an edge for the relationship fact.</p>
    <div id="graph"></div>
    <div id="details">
      <div class="node-label"></div>
      <div class="node-summary"></div>
    </div>
    <div id="graph-error"></div>
  </section>

  <section class="section">
    <h2>3. Ask your graph</h2>
    <p class="subtitle">Answers use only facts from your identity graph.</p>
    <div id="chips" class="chips">
      <button class="chip">What are my strongest skills?</button>
      <button class="chip">What am I working on?</button>
      <button class="chip">What connects my interests?</button>
    </div>
    <div id="chat" class="chat-area"></div>
    <div class="input-row">
      <input id="chat-input" type="text" placeholder="Ask a question...">
      <button id="ask-btn" class="primary">Ask</button>
    </div>
    <div id="chat-error"></div>
  </section>

</div>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script>
let network = null;
let graphData = { nodes: [], edges: [] };
let chatBusy = false;

const $ = id => document.getElementById(id);
const escapeHtml = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);

// ===== Ingest =====
const ingestBtn = $('ingest-btn');
const ingestText = $('ingest-text');
const ingestStatus = $('ingest-status');

ingestBtn.addEventListener('click', async () => {
  const text = ingestText.value.trim();
  if (!text) return;
  ingestStatus.innerHTML = '';
  ingestBtn.disabled = true;
  ingestBtn.innerHTML = 'Ingesting<span class="dots"></span> (30–90s)';
  try {
    const res = await fetch('/ingest', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text }),
    });
    if (!res.ok) throw new Error((await res.text()) || `HTTP ${res.status}`);
    ingestText.value = '';
    showToast('Ingested ✓');
    loadGraph();
  } catch (e) {
    console.error('Ingest failed:', e);
    ingestStatus.innerHTML = `<span class="error">Ingest failed: ${escapeHtml(e.message)}</span>`;
  } finally {
    ingestBtn.disabled = false;
    ingestBtn.textContent = 'Ingest';
  }
});

function showToast(msg) {
  ingestStatus.innerHTML = `<span class="toast">${escapeHtml(msg)}</span>`;
  const el = ingestStatus.querySelector('.toast');
  setTimeout(() => el && el.classList.add('fade'), 2500);
  setTimeout(() => { ingestStatus.innerHTML = ''; }, 3000);
}

// ===== Graph =====
const graphEl = $('graph');
const detailsEl = $('details');
const graphError = $('graph-error');
$('refresh-btn').addEventListener('click', loadGraph);

async function loadGraph() {
  graphError.innerHTML = '';
  detailsEl.classList.remove('visible');
  try {
    const res = await fetch('/graph');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    graphData = data;

    if (network) { network.destroy(); network = null; }
    if (!data.nodes || data.nodes.length === 0) {
      graphEl.innerHTML = '<div class="empty">No graph yet. Ingest something above.</div>';
      return;
    }

    const degree = {};
    data.edges.forEach(e => {
      degree[e.source] = (degree[e.source] || 0) + 1;
      degree[e.target] = (degree[e.target] || 0) + 1;
    });
    const ds = data.nodes.map(n => degree[n.id] || 0);
    const dMin = Math.min(...ds), dMax = Math.max(...ds);
    const sizeFor = d => dMax === dMin ? 20 : 10 + ((d - dMin) / (dMax - dMin)) * 30;

    const nodes = data.nodes.map(n => ({
      id: n.id,
      label: n.label || '',
      title: n.summary || n.label || '',
      size: sizeFor(degree[n.id] || 0),
    }));
    const edges = data.edges.map(e => ({
      id: e.id,
      from: e.source,
      to: e.target,
      title: e.label || '',
    }));

    graphEl.innerHTML = '';
    network = new vis.Network(graphEl, { nodes, edges }, {
      nodes: {
        shape: 'dot',
        color: { background: '#4f46e5', border: '#3730a3', highlight: { background: '#6366f1', border: '#3730a3' } },
        font: { color: '#111827', size: 14, face: 'inherit' },
        borderWidth: 1,
      },
      edges: {
        arrows: 'to',
        smooth: { enabled: true, type: 'dynamic' },
        color: { color: '#9ca3af', highlight: '#4f46e5' },
      },
      physics: { enabled: true, stabilization: { enabled: true, iterations: 200 } },
      interaction: { hover: true, tooltipDelay: 150 },
    });
    setTimeout(() => { if (network) network.setOptions({ physics: false }); }, 2000);

    network.on('selectNode', params => {
      const id = params.nodes[0];
      const node = graphData.nodes.find(n => n.id === id);
      if (!node) return;
      detailsEl.querySelector('.node-label').textContent = node.label || '(unnamed)';
      detailsEl.querySelector('.node-summary').textContent = node.summary || '(no summary)';
      detailsEl.classList.add('visible');
    });
    network.on('deselectNode', () => detailsEl.classList.remove('visible'));
  } catch (e) {
    console.error('Graph load failed:', e);
    graphError.innerHTML = `<div class="error">Failed to load graph: ${escapeHtml(e.message)}</div>`;
  }
}

// ===== Chat =====
const chatEl = $('chat');
const chatInput = $('chat-input');
const askBtn = $('ask-btn');
const chipsEl = $('chips');
const chatError = $('chat-error');

chipsEl.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    chatInput.value = chip.textContent;
    submitQuestion();
  });
});

askBtn.addEventListener('click', submitQuestion);
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitQuestion();
  }
});

async function submitQuestion() {
  if (chatBusy) return;
  const q = chatInput.value.trim();
  if (!q) return;
  chatError.innerHTML = '';
  chipsEl.style.display = 'none';

  appendBubble('user', q);
  chatInput.value = '';
  const placeholder = appendBubble('agent', '<span class="dots"></span>', true);
  chatBusy = true;
  chatInput.disabled = true;
  askBtn.disabled = true;

  try {
    const res = await fetch('/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ question: q }),
    });
    if (!res.ok) throw new Error((await res.text()) || `HTTP ${res.status}`);
    const data = await res.json();
    placeholder.innerHTML =
      `<div>${escapeHtml(data.answer || '(no answer)')}</div>` +
      `<details><summary>▸ sources</summary><pre>${escapeHtml(JSON.stringify(data.sources || [], null, 2))}</pre></details>`;
  } catch (e) {
    console.error('Query failed:', e);
    placeholder.remove();
    chatError.innerHTML = `<div class="error">Query failed: ${escapeHtml(e.message)}</div>`;
  } finally {
    chatBusy = false;
    chatInput.disabled = false;
    askBtn.disabled = false;
    chatInput.focus();
    chatEl.scrollTop = chatEl.scrollHeight;
  }
}

function appendBubble(kind, content, asHtml = false) {
  const div = document.createElement('div');
  div.className = `bubble ${kind}`;
  if (asHtml) div.innerHTML = content;
  else div.textContent = content;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

loadGraph();
</script>
</body>
</html>
